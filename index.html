<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXI Panel de control</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="favicon-192x192.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-start: #0B3954; 
            --bg-end: #061A2B;
            --glass-bg: rgba(20, 30, 50, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-sec: rgba(255, 255, 255, 0.6);
            --accent-cyan: #7AF0D4;
            --accent-blue: #EAE2D1;
        }

        /* ... (Mantenemos todo tu CSS original) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, var(--bg-start), var(--bg-end)); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .dashboard { padding: 20px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; }
        .card-title { font-size: 12px; text-transform: uppercase; color: var(--text-sec); letter-spacing: 2px; margin-bottom: 15px; }
        .right-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

        /* --- NUEVO ESTILO DEL BOTÓN SERVO (FXI STYLE) --- */
        .btn-servo {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 15px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            letter-spacing: 1px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-servo.active {
            background: var(--accent-cyan);
            color: #061A2B;
            box-shadow: 0 0 25px rgba(122, 240, 212, 0.5);
            transform: scale(1.02);
        }

        .btn-servo:hover {
            background: rgba(122, 240, 212, 0.15);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <canvas id="bg-particles"></canvas>
    
    <div class="dashboard">
        <div class="left-panel">
            <div class="glass-card main-chart-card">
                <div class="card-title">Telemetría Ambiental</div>
                <div style="font-size: 48px; font-weight: 800; color: var(--accent-cyan);" id="temp-val">--°C</div>
                <div style="color: var(--text-sec);">Humedad: <span id="hum-val">--%</span></div>
            </div>
        </div>

        <div class="right-grid">
            <div class="glass-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(122, 240, 212, 0.3);">
                <div class="card-title">Módulo de Barrido Radar</div>
                <button id="btn-servo" class="btn-servo" onclick="toggleServo()">DESACTIVADO</button>
                <div style="font-size: 10px; color: var(--text-sec); margin-top: 8px;">Control Manual del Servomotor</div>
            </div>

            <div class="glass-card">
                <div class="card-title">Estado Red</div>
                <div id="status-mqtt" style="color: #ff5555;">Desconectado</div>
                <div style="font-size: 11px; margin-top: 5px;">Señal: <span id="rssi-val">-- dBm</span></div>
            </div>
        </div>
    </div>

    <script>
        // --- FUNCIÓN PARA EL SERVO ---
        function toggleServo() {
            const btn = document.getElementById('btn-servo');
            
            fetch('/toggleServo')
                .then(response => response.text())
                .then(state => {
                    if(state === "ON") {
                        btn.classList.add('active');
                        btn.innerText = "SISTEMA ACTIVO";
                    } else {
                        btn.classList.remove('active');
                        btn.innerText = "DESACTIVADO";
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    alert("No se pudo conectar con el ESP32");
                });
        }

        // Lógica de actualización de datos (Simulada para el ejemplo)
        setInterval(() => {
            fetch('/datos')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('temp-val').innerText = data.temp.toFixed(1) + "°C";
                    document.getElementById('hum-val').innerText = data.hum.toFixed(0) + "%";
                    document.getElementById('rssi-val').innerText = data.rssi;
                });
        }, 2000);

        // ... (Tu código de partículas y MQTT aquí abajo) ...
    </script>
</body>
</html>
