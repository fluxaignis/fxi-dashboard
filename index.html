<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXI Panel de control</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="favicon-192x192.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* (ESTILOS IGUALES, SIN CAMBIOS) */
        :root {
            --bg-start: #0B3954;
            --bg-end: #061A2B;
            --glass-bg: rgba(20, 30, 50, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-sec: rgba(255, 255, 255, 0.6);
            --accent-cyan: #7AF0D4;
            --accent-blue: #EAE2D1;
            --chart-pink: #F06292;
            --chart-blue: #4FC3F7;
            --chart-green: #81C784;
            --flame-normal: #FFA726;
            --flame-danger: #FF3D00;
            --danger-glow: rgba(255, 61, 0, 0.6);
        }
        body.light-mode {
            --bg-start: #E0F2F1;
            --bg-end: #B2EBF2;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #0B3954;
            --text-sec: rgba(11, 57, 84, 0.6);
            --danger-glow: rgba(255, 61, 0, 0.8);
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-main);
            min-height: 100vh; overflow-x: hidden;
            transition: background 0.5s ease;
        }
        body.danger-alert .glass-card {
            box-shadow: 0 0 15px var(--danger-glow), 0 0 30px rgba(255, 61, 0, 0.3);
            border-color: var(--flame-danger);
            transition: all 0.3s ease;
        }
        #weather-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .main-content {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto;
            padding: 40px 20px;
            display: flex; flex-direction: column;
        }
        .header { display: flex; align-items: center; margin-bottom: 35px; width: 100%; }
        .fxi-logo {
            font-weight: 900; font-size: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-right: 20px;
        }
        #theme-toggle {
            margin-left: auto; cursor: pointer; font-size: 26px;
            transition: transform 0.2s; user-select: none;
        }
        #theme-toggle:hover { transform: scale(1.2); }
        .dashboard-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 25px; }
        .left-column, .right-column { display: flex; flex-direction: column; gap: 25px; }
        .right-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); }
        .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-sec); margin-bottom: 10px; }
        .val-big { font-size: clamp(40px, 8vw, 64px); font-weight: 200; transition: all 0.5s ease; }
        .val-med { font-size: 32px; font-weight: 500; transition: all 0.5s ease; }
        .unit { font-size: 16px; opacity: 0.7; }
        .chart-container { height: 120px; display: flex; align-items: flex-end; justify-content: space-around; margin-top: 15px; }
        .bar-group { width: 35px; text-align: center; }
        .bar-bg { height: 80px; background: rgba(0,0,0,0.1); border-radius: 6px; display: flex; align-items: flex-end; overflow: hidden; }
        .bar-fill { width: 100%; transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .footer { margin-top: 40px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-update, .btn-reset {
            background: var(--accent-blue); color: #0B3954; border: none;
            padding: 12px 30px; border-radius: 50px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(234, 226, 209, 0.2);
            transition: all 0.3s ease;
        }
        .btn-reset {
            background: var(--chart-pink);
            color: white;
        }
        .btn-update:hover, .btn-reset:hover { transform: translateY(-2px); }
        #esp-status { font-size: 10px; padding: 3px 8px; border-radius: 10px; color: #fff; background: var(--chart-pink); }
        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .main-content { padding: 20px; }
            .right-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .right-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            #theme-toggle { margin-left: 0; }
        }
        .btn-servo {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            letter-spacing: 1px;
        }
        .btn-servo.active {
            background: var(--accent-cyan);
            color: #061A2B;
            box-shadow: 0 0 20px rgba(122, 240, 212, 0.4);
            transform: scale(1.05);
        }
        .btn-servo:hover {
            background: rgba(122, 240, 212, 0.1);
            transform: translateY(-2px);
        }
        .flame-card {
            text-align: center;
            cursor: pointer;
        }
        .flame-icon {
            font-size: 70px;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));
        }
        .flame-icon.normal {
            color: var(--flame-normal);
            text-shadow: 0 0 5px #FFA726;
        }
        .flame-icon.danger {
            color: var(--flame-danger);
            text-shadow: 0 0 20px #FF3D00;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 5px #FF3D00; }
            50% { transform: scale(1.1); text-shadow: 0 0 25px #FF3D00; }
            100% { transform: scale(1); text-shadow: 0 0 5px #FF3D00; }
        }
        .flame-status {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        .chart-wrapper {
            height: 200px;
            margin-top: 15px;
        }
        .range-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .range-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .range-btn.active {
            background: var(--accent-cyan);
            color: #0B3954;
        }
        .range-btn:hover {
            background: var(--accent-cyan);
            color: #0B3954;
        }
        .avg-text {
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            color: var(--text-sec);
        }
    </style>
</head>
<body>
    <canvas id="weather-canvas"></canvas>
    <div class="main-content">
        <div class="header">
            <div class="fxi-logo">FLUXA IGNIS</div>
            <div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="font-weight: 600; font-size: 18px;">Módulo ESP32</div>
                    <span id="esp-status">Conectando...</span>
                </div>
                <div style="font-size: 12px; color: var(--text-sec);">Sistema Activo</div>
            </div>
            <div id="theme-toggle">✳</div>
        </div>

        <div class="dashboard-grid">
            <div class="left-column">
                <div class="glass-card" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div class="card-title">Temperatura</div>
                        <div class="val-big" id="temp-val">--<span class="unit">°C</span></div>
                        <div id="desc-val" style="font-size: 14px; opacity: 0.8;">Esperando datos...</div>
                    </div>
                    <div style="font-size: 60px;">🌡️</div>
                </div>

                <div class="glass-card">
                    <div class="card-title">Niveles Actuales</div>
                    <div class="chart-container">
                        <div class="bar-group">
                            <div class="bar-bg"><div id="bar-temp" class="bar-fill" style="background: var(--chart-pink); height: 0%;"></div></div>
                            <div style="font-size: 10px; margin-top: 5px;">T</div>
                        </div>
                        <div class="bar-group">
                            <div class="bar-bg"><div id="bar-hum" class="bar-fill" style="background: var(--chart-blue); height: 0%;"></div></div>
                            <div style="font-size: 10px; margin-top: 5px;">H</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="card-title">Tendencias (Temp / Hum)</div>
                    <div class="chart-wrapper">
                        <canvas id="tempHumChart" width="400" height="160"></canvas>
                    </div>
                    <div class="range-buttons">
                        <button class="range-btn" data-points="20">20 últimos</button>
                        <button class="range-btn" data-points="50">50 últimos</button>
                        <button class="range-btn" data-points="100">100 últimos</button>
                        <button class="range-btn" data-points="200">200 últimos</button>
                    </div>
                    <div class="avg-text" id="avgText">Promedio: --</div>
                </div>
            </div>

            <div class="right-column">
                <div class="right-grid">
                    <div class="glass-card flame-card" style="grid-column: span 2;" id="flameCard">
                        <div class="flame-icon" id="flameIcon">🔥</div>
                        <div class="flame-status" id="flameStatus">Estado: Normal</div>
                        <div style="font-size: 12px; opacity: 0.7;">Detección óptica de incendios</div>
                    </div>

                    <div class="glass-card">
                        <div class="card-title">Humedad</div>
                        <div class="val-med" id="hum-val">--<span class="unit">%</span></div>
                    </div>
                    <div class="glass-card">
                        <div class="card-title">Señal RSSI</div>
                        <div class="val-med" id="rssi-val">--<span class="unit">dBm</span></div>
                    </div>
                    <div class="glass-card">
                        <div class="card-title">Estado Red</div>
                        <div id="net-status" style="font-size: 14px; font-weight: bold; color: var(--accent-cyan);">Buscando Nube...</div>
                    </div>
                    <div class="glass-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;">
                        <div class="card-title">Barrido de Radar</div>
                        <button id="btn-servo" class="btn-servo" onclick="toggleServo()">DESACTIVADO</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn-update" onclick="iniciarSistema()">Reconectar Sistema</button>
            <button class="btn-reset" id="resetAlertBtn">🔄 Resetear Alerta (Forzar)</button>
        </div>
    </div>

    <script>
        // --- VARIABLES GLOBALES ---
        let isDarkMode = true;
        let dangerMode = false;
        let emergenciaActivaPorMQTT = false;
        let simulationActive = false;
        
        let tempHistory = [];
        let currentPoints = 20;
        let ctxChart = null;
        let client = null;

        // Umbrales de desactivación
        const UMBRAL_DESACTIVACION_CRITICA = 38.0;   // para alerta por temperatura ≥40°C
        const UMBRAL_DESACTIVACION_FUEGO = 35.0;     // para alertas MQTT de fuego real

        // --- INICIALIZAR GRÁFICA ---
        function initChart() {
            const canvas = document.getElementById('tempHumChart');
            if (ctxChart) ctxChart.destroy();
            ctxChart = new Chart(canvas, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Temperatura (°C)', data: [], borderColor: '#F06292', backgroundColor: 'rgba(240,98,146,0.1)', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 2, yAxisID: 'y' },
                        { label: 'Humedad (%)', data: [], borderColor: '#4FC3F7', backgroundColor: 'rgba(79,195,247,0.1)', borderWidth: 2, fill: true, tension: 0.3, pointRadius: 2, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: true,
                    scales: {
                        y: { beginAtZero: false, grid: { color: 'rgba(255,255,255,0.1)' }, title: { display: true, text: '°C', color: '#F06292' } },
                        y1: { position: 'right', beginAtZero: false, grid: { drawOnChartArea: false }, title: { display: true, text: '%', color: '#4FC3F7' } },
                        x: { title: { display: true, text: 'Registros' }, ticks: { maxRotation: 45 } }
                    },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
            updateChartDisplay();
        }

        function updateChartDisplay() {
            if (!ctxChart) return;
            const start = Math.max(0, tempHistory.length - currentPoints);
            const sliced = tempHistory.slice(start);
            const temps = sliced.map(p => p.temp);
            const hums = sliced.map(p => p.hum);
            const labels = sliced.map((_, i) => i+1);
            ctxChart.data.labels = labels;
            ctxChart.data.datasets[0].data = temps;
            ctxChart.data.datasets[1].data = hums;
            ctxChart.update();
            if (temps.length) {
                const avgTemp = (temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1);
                const avgHum = (hums.reduce((a,b)=>a+b,0)/hums.length).toFixed(0);
                document.getElementById('avgText').innerHTML = `📊 Promedio (últimos ${currentPoints}): Temp ${avgTemp}°C / Hum ${avgHum}%`;
            } else {
                document.getElementById('avgText').innerHTML = `Promedio: --`;
            }
        }

        function addDataPoint(temp, hum) {
            tempHistory.push({ temp, hum, timestamp: Date.now() });
            if (tempHistory.length > 500) tempHistory.shift();
            updateChartDisplay();
        }

        // --- MANEJO DE ALERTA VISUAL ---
        function setDangerMode(active, motivo = "") {
            if (active === dangerMode) return;
            dangerMode = active;
            if (dangerMode) {
                document.body.classList.add('danger-alert');
                document.getElementById('flameIcon').classList.add('danger');
                document.getElementById('flameIcon').classList.remove('normal');
                document.getElementById('flameStatus').innerHTML = `⚠️ ¡PELIGRO! ${motivo || "Incendio detectado"}`;
                document.getElementById('flameStatus').style.color = '#FF3D00';
            } else {
                document.body.classList.remove('danger-alert');
                document.getElementById('flameIcon').classList.remove('danger');
                document.getElementById('flameIcon').classList.add('normal');
                document.getElementById('flameStatus').innerHTML = 'Estado: Normal';
                document.getElementById('flameStatus').style.color = 'inherit';
            }
        }

        // Forzar desactivación manual
        function resetAlertaForzado() {
            emergenciaActivaPorMQTT = false;
            setDangerMode(false, "");
            if (simulationActive && client && client.connected) {
                client.publish('fxi/simular', 'FUEGO_OFF');
                simulationActive = false;
            }
            const statusDiv = document.getElementById('net-status');
            statusDiv.innerText = "Alerta reiniciada manualmente";
            setTimeout(() => {
                if (!dangerMode) statusDiv.innerText = "Conexión Estable";
                else statusDiv.innerText = "Modo peligro activo";
            }, 2000);
        }

        // --- ACTUALIZACIÓN DE UI CON AUTO-DESACTIVACIÓN SIMPLIFICADA ---
        function actualizarTemperatura(temp) {
            const tempVal = parseFloat(temp);
            document.getElementById('temp-val').innerHTML = `${tempVal.toFixed(1)}<span class="unit">°C</span>`;
            let altura = Math.min(100, tempVal * 2);
            document.getElementById('bar-temp').style.height = altura + '%';
            let desc = '';
            if (tempVal < 20) desc = 'Ambiente fresco';
            else if (tempVal < 30) desc = 'Temperatura normal';
            else if (tempVal < 40) desc = 'Calor elevado';
            else desc = '¡PELIGRO! Calor extremo';
            document.getElementById('desc-val').innerText = desc;
            
            // LÓGICA DE DESACTIVACIÓN SEGÚN EL TIPO DE ALERTA
            if (dangerMode) {
                if (emergenciaActivaPorMQTT) {
                    // Alerta por fuego real (MQTT)
                    if (tempVal < UMBRAL_DESACTIVACION_FUEGO) {
                        setDangerMode(false, "");
                        emergenciaActivaPorMQTT = false;
                        console.log("Alerta MQTT desactivada: temperatura < " + UMBRAL_DESACTIVACION_FUEGO);
                    }
                } else {
                    // Alerta por temperatura crítica (≥40°C)
                    if (tempVal < UMBRAL_DESACTIVACION_CRITICA) {
                        setDangerMode(false, "");
                        console.log("Alerta por calor desactivada: temp < " + UMBRAL_DESACTIVACION_CRITICA);
                    }
                }
            }
            
            // ACTIVACIÓN POR TEMPERATURA CRÍTICA (solo si no hay emergencia MQTT activa)
            if (!dangerMode && tempVal >= 40.0 && !emergenciaActivaPorMQTT) {
                setDangerMode(true, "Temperatura crítica > 40°C");
            }
        }

        function actualizarHumedad(hum) {
            document.getElementById('hum-val').innerHTML = `${Math.round(hum)}<span class="unit">%</span>`;
            document.getElementById('bar-hum').style.height = hum + '%';
        }

        function actualizarRSSI(rssi) {
            const el = document.getElementById('rssi-val');
            el.innerHTML = `${rssi}<span class="unit">dBm</span>`;
            if (rssi > -60) el.style.color = '#81C784';
            else if (rssi > -75) el.style.color = '#FFD54F';
            else el.style.color = '#F06292';
        }

        // --- MQTT ---
        const options = {
            connectTimeout: 4000,
            clientId: 'fxi_web_' + Math.random().toString(16).substr(2, 8),
            username: 'Admin',
            password: 'FluxaIgnis2026',
        };

        function conectarMQTT() {
            client = mqtt.connect('wss://df734b8fbeed43978f29869442892dcf.s1.eu.hivemq.cloud:8884/mqtt', options);

            client.on('connect', () => {
                console.log('Conectado a HiveMQ');
                document.getElementById('esp-status').innerText = 'Online';
                document.getElementById('esp-status').style.background = 'var(--chart-green)';
                document.getElementById('net-status').innerText = 'Conexión Estable';
                document.getElementById('net-status').style.color = 'var(--text-sec)';
                client.subscribe('fxi/datos');
                client.subscribe('fxi/rssi');
                client.subscribe('fxi/emergencia');
                client.subscribe('fxi/simular');
                emergenciaActivaPorMQTT = false;
                simulationActive = false;
            });

            client.on('message', (topic, message) => {
                try {
                    const payload = message.toString();
                    if (topic === 'fxi/datos') {
                        const data = JSON.parse(payload);
                        if (data.temp !== undefined && data.hum !== undefined) {
                            actualizarTemperatura(data.temp);
                            actualizarHumedad(data.hum);
                            addDataPoint(data.temp, data.hum);
                        } else if (data.temp !== undefined) actualizarTemperatura(data.temp);
                        else if (data.hum !== undefined) actualizarHumedad(data.hum);
                    } 
                    else if (topic === 'fxi/rssi') {
                        const data = JSON.parse(payload);
                        if (data.rssi !== undefined) actualizarRSSI(data.rssi);
                    }
                    else if (topic === 'fxi/emergencia') {
                        const data = JSON.parse(payload);
                        const motivo = data.motivo || "Incendio detectado";
                        const tempEmergencia = data.temperatura;
                        
                        // IGNORAR ALERTAS POR AUMENTO SOSPECHOSO
                        if (motivo.includes("AUMENTO") || motivo.includes("sospechoso")) {
                            console.log("Alerta ignorada (aumento sospechoso): " + motivo);
                            return;
                        }
                        
                        // Activar alerta para fuego real
                        setDangerMode(true, motivo);
                        emergenciaActivaPorMQTT = true;
                        
                        // Notificación del navegador
                        if (Notification.permission === "granted") {
                            new Notification("🚨 ALERTA FLUXA IGNIS", { body: motivo + " | Temp: " + tempEmergencia + "°C" });
                        }
                        // Mensaje temporal en estado de red
                        const statusDiv = document.getElementById('net-status');
                        statusDiv.innerText = "🔴 ¡EMERGENCIA! " + motivo;
                        statusDiv.style.color = "#FF3D00";
                        setTimeout(() => {
                            if (!dangerMode) {
                                statusDiv.innerText = "Conexión Estable";
                                statusDiv.style.color = "var(--text-sec)";
                            }
                        }, 5000);
                    }
                    else if (topic === 'fxi/simular') {
                        if (payload === 'FUEGO_ON') {
                            simulationActive = true;
                            console.log("Simulación activada");
                        } else if (payload === 'FUEGO_OFF') {
                            simulationActive = false;
                            console.log("Simulación desactivada");
                        }
                    }
                } catch (e) { console.error(e); }
            });

            client.on('offline', () => {
                document.getElementById('esp-status').innerText = 'Offline';
                document.getElementById('esp-status').style.background = 'var(--chart-pink)';
                document.getElementById('net-status').innerText = 'Servidor MQTT Inaccesible';
                document.getElementById('net-status').style.color = '#F06292';
            });
        }

        function iniciarSistema() {
            document.getElementById('esp-status').innerText = 'Verificando red...';
            if (typeof mqtt === 'undefined') {
                document.getElementById('esp-status').innerText = 'Error';
                return;
            }
            if (client) client.end();
            setTimeout(conectarMQTT, 500);
        }

        // --- CONTROL DEL SERVO ---
        function toggleServo() {
            const btn = document.getElementById('btn-servo');
            btn.innerText = "ENVIANDO...";
            btn.style.opacity = "0.7";
            if (client && client.connected) {
                client.publish('fxi/comandos', 'TOGGLE');
                btn.style.opacity = "1";
                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                    btn.innerText = "DESACTIVADO";
                } else {
                    btn.classList.add('active');
                    btn.innerText = "SISTEMA ACTIVO";
                }
            } else {
                fetch('/toggleServo')
                    .then(response => response.text())
                    .then(state => {
                        btn.style.opacity = "1";
                        if(state === "ON") {
                            btn.classList.add('active');
                            btn.innerText = "SISTEMA ACTIVO";
                        } else {
                            btn.classList.remove('active');
                            btn.innerText = "DESACTIVADO";
                        }
                    })
                    .catch(() => {
                        btn.classList.remove('active');
                        btn.style.opacity = "1";
                        btn.innerText = "SIN CONEXIÓN";
                        setTimeout(() => { btn.innerText = "DESACTIVADO"; }, 3000);
                    });
            }
        }

        // --- BOTONES DE RANGO PARA GRÁFICA ---
        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPoints = parseInt(btn.getAttribute('data-points'), 10);
                updateChartDisplay();
            });
        });
        document.querySelector('.range-btn[data-points="20"]').classList.add('active');

        // --- BOTÓN RESETEAR ALERTA ---
        document.getElementById('resetAlertBtn').addEventListener('click', resetAlertaForzado);

        // --- TEMA Y PARTÍCULAS ---
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.onclick = () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            themeBtn.innerText = isDarkMode ? '✳' : '☀️';
            initParticles();
            if (ctxChart) {
                ctxChart.options.plugins.legend.labels.color = isDarkMode ? '#fff' : '#0B3954';
                ctxChart.options.scales.y.grid.color = isDarkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
                ctxChart.update();
            }
        };

        const canvas = document.getElementById('weather-canvas');
        const ctxP = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.02;
            }
            update() { this.alpha += this.speed; if(this.alpha > 1 || this.alpha < 0) this.speed *= -1; }
            draw() {
                ctxP.fillStyle = isDarkMode ? `rgba(234,226,209,${this.alpha*0.2})` : `rgba(11,57,84,${this.alpha*0.1})`;
                ctxP.beginPath(); ctxP.arc(this.x, this.y, this.size, 0, Math.PI*2); ctxP.fill();
            }
        }
        function initParticles() { particles = []; for(let i=0;i<60;i++) particles.push(new Particle()); }
        function animate() { ctxP.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animate); }
        initParticles(); animate();
        initChart();
        iniciarSistema();
        if (Notification.permission === "default") Notification.requestPermission();
    </script>
</body>
</html>
